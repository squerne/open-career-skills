<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Open Career Skills: seven Claude skills and an /apply pipeline that refuse to invent facts about you">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171532"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.05" r="0.9">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="20" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#818cf8" stroke-opacity="0.06" stroke-width="1">
    <path d="M213 0V640M426 0V640M640 0V640M853 0V640M1066 0V640"/>
    <path d="M0 160H1280M0 320H1280M0 480H1280"/>
  </g>

  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="640" y="150" text-anchor="middle" font-size="92" font-weight="800" fill="#f8fafc" letter-spacing="-2">Open Career Skills</text>
    <rect x="520" y="184" width="240" height="8" rx="4" fill="url(#accent)"/>
    <text x="640" y="262" text-anchor="middle" font-size="40" fill="#c7d2fe">Claude skills for the job hunt that refuse</text>
    <text x="640" y="314" text-anchor="middle" font-size="40" fill="#c7d2fe">to invent facts about you.</text>

    <!-- skill chips, two centered rows, sized for mobile -->
    <g font-size="26" font-weight="600">
      <rect x="126" y="368" width="224" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="238" y="406" text-anchor="middle" fill="#e0e7ff">cv-optimizer</text>
      <rect x="366" y="368" width="252" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="492" y="406" text-anchor="middle" fill="#e0e7ff">story-extractor</text>
      <rect x="634" y="368" width="268" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="768" y="406" text-anchor="middle" fill="#e0e7ff">360brew-planner</text>
      <rect x="918" y="368" width="236" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="1036" y="406" text-anchor="middle" fill="#e0e7ff">mock-interviewer</text>

      <rect x="188" y="442" width="212" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="294" y="480" text-anchor="middle" fill="#e0e7ff">cover-letter</text>
      <rect x="416" y="442" width="196" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="514" y="480" text-anchor="middle" fill="#e0e7ff">job-search</text>
      <rect x="628" y="442" width="248" height="58" rx="29" fill="#312e81" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="752" y="480" text-anchor="middle" fill="#e0e7ff">evidence-miner</text>
      <rect x="892" y="442" width="200" height="58" rx="29" fill="#1d1a45" stroke="url(#accent)" stroke-width="2.5"/>
      <text x="992" y="480" text-anchor="middle" fill="#a7f3d0">+ /apply</text>
    </g>

    <text x="640" y="574" text-anchor="middle" font-size="28" fill="#818cf8">MIT · runs locally in Claude Code &amp; Claude Desktop · your data stays local</text>
  </g>
</svg>
